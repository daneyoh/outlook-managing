<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Outlook 메일</title>
  <style>
    :root {
      /* Notion-like light palette */
      --primary: #2383e2;
      --primary-dim: rgba(35, 131, 226, .12);
      --ink: #37352f;
      --ink-60: #787671;
      --ink-30: #afada8;
      --canvas: #ffffff;
      --parchment: #f7f7f5;
      --hairline: #e9e9e8;
      --soft: #fbfbfa;
      --red: #d93025;
      --red-bg: rgba(217, 48, 37, .07);
      --amber: #f29900;
      --amber-bg: rgba(242, 153, 0, .08);
      --good: #1e8e3e;
      --c-unread: #2383e2;
      --c-todo: #7b68ee;
      --c-reply: #d97706;
      /* aliases */
      --ink-48: #9b9a97;
      --ink-80: #4a4844;
      --primary-focus: #1967c2;
      /* App bg */
      --app-bg: #ffffff;
      --blur: blur(0px);
      --r-widget: 12px;
      --r-card: 10px;
      --r-row: 8px;
      --r-sm: 6px;
      --r-pill: 9999px;
      /* Motion */
      --t-fast: .12s;
      --t-base: .18s;
      --t-slow: .24s;
      --ease: cubic-bezier(.4, 0, .2, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: transparent;
      font-family: "Malgun Gothic", "맑은 고딕", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      color: var(--ink);
      -webkit-user-select: none;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background: var(--app-bg);
      border-radius: var(--r-widget);
      border: 1px solid var(--hairline);
      box-shadow: 0 1px 2px rgba(18, 18, 24, .04), 0 4px 16px rgba(18, 18, 24, .06);
    }

    /* ── 알림 배너 ── */
    #alert {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--red-bg);
      color: var(--red);
      border-bottom: 1px solid var(--hairline);
      font-size: 12px;
      font-weight: 600;
      padding: 9px 18px;
    }

    #alert.on {
      display: flex;
    }

    #alert::before {
      content: "⚠";
    }

    #auth-banner {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--red-bg);
      color: var(--red);
      border-bottom: 1px solid var(--hairline);
      font-size: 12px;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
    }

    #auth-banner.on {
      display: flex;
    }

    #auth-banner::before {
      content: "🔒";
      font-size: 13px;
    }

    /* ── 헤더 ── */
    .head {
      flex-shrink: 0;
      background: var(--canvas);
      padding: 12px 12px 0;
      border-bottom: 1px solid var(--hairline);
      z-index: 5;
    }

    /* 카운트 카드 3개 */
    .cards,
    .proj-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }


    .card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-card);
      padding: 8px 4px 7px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color .14s, background .14s, box-shadow .14s;
    }
    
    .card[data-k="외부요청"] {
      --card-accent: var(--c-todo);
    }
    .card[data-k="사내"] {
      --card-accent: var(--c-unread);
    }
    .card[data-k="미회신"] {
      --card-accent: var(--c-reply);
    }

    .card .n {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -.4px;
    }
    .card .l {
      font-size: 11px;
      color: var(--ink-60);
      margin-top: 2px;
      font-weight: 500;
    }

    .card.on {
      background: var(--soft);
      border-color: var(--card-accent, var(--primary));
      box-shadow: 0 1px 0 rgba(35, 131, 226, .08);
    }
    .card.on .n { color: var(--card-accent, var(--primary)); }

    /* ── 동적 프로젝트 카드 (아코디언) ── */
    .proj-dyn-add-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--primary);
      background: var(--primary-dim);
      border: 1px dashed rgba(91,156,246,.4);
      border-radius: var(--r-card);
      padding: 8px 14px; cursor: pointer; width: 100%;
      margin-bottom: 8px; transition: background .13s;
    }
    .proj-dyn-add-btn:hover { background: var(--primary-dim); border-color: var(--primary); }

    .pc-accordion {
      border: 1px solid var(--hairline);
      border-radius: var(--r-card);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .14s, box-shadow .14s;
      --pc-accent: var(--primary);
      --pc-accent-dim: rgba(35, 131, 226, .4);
      --pc-accent-bg: rgba(35, 131, 226, .06);
    }
    .pc-accordion.open {
      border-color: var(--pc-accent-dim);
      box-shadow: 0 1px 0 rgba(35, 131, 226, .08);
    }

    .pc-header {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px; cursor: pointer;
      background: var(--canvas);
      user-select: none;
      transition: background .13s;
    }
    .pc-header:hover { background: var(--soft); }

    .pc-name {
      font-size: 13px; font-weight: 600; color: var(--ink);
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .stage-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
      background: var(--pc-accent-bg, var(--primary-dim));
      color: var(--pc-accent, var(--primary));
      border: 1px solid var(--pc-accent-dim, rgba(91, 156, 246, .3));
      white-space: nowrap;
    }
    .stage-badge.future {
      background: var(--soft); color: var(--ink-60);
      border-color: var(--hairline);
    }

    .pc-chevron {
      font-size: 13px; color: var(--ink-48); flex-shrink: 0;
      display: flex; align-items: center;
      transition: transform var(--t-base) var(--ease), color var(--t-fast) var(--ease);
    }
    .pc-accordion.open .pc-chevron { transform: rotate(180deg); color: var(--pc-accent, var(--primary)); }

    .icon-btn {
      background: transparent; border: 1px solid var(--hairline);
      border-radius: var(--r-sm); color: var(--ink-60);
      font-size: 13px; width: 26px; height: 26px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
      transition: background .13s, color .13s, border-color .13s;
    }
    .icon-btn:hover { background: var(--soft); color: var(--ink); border-color: var(--primary); }

    .pc-tabbar {
      display: flex; border-top: 1px solid var(--hairline);
      background: var(--parchment);
    }
    .pc-tab {
      flex: 1; padding: 7px 0; font-size: 11px; font-weight: 500;
      color: var(--ink-48); background: transparent; border: none;
      cursor: pointer; transition: color .13s, background .13s;
      border-bottom: 2px solid transparent;
    }
    .pc-tab.on {
      color: var(--pc-accent, var(--primary));
      border-bottom-color: var(--pc-accent, var(--primary));
      background: var(--pc-accent-bg, var(--primary-dim));
    }
    .pc-tab:hover:not(.on) { color: var(--ink); background: var(--soft); }

    .pc-body { padding: 12px 12px 10px; background: var(--parchment); }
    .pc-section-title { font-size: 11px; color: var(--ink-48); margin: 12px 0 6px; text-transform: uppercase; letter-spacing: .04em; }

    /* 마일스톤 스테퍼 */
    .ms-stepper { display: flex; align-items: flex-start; gap: 0; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .ms-stepper::-webkit-scrollbar { display: none; }
    .ms-step { display: flex; flex-direction: column; align-items: center; min-width: 56px; position: relative; }
    .ms-step-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--hairline); background: transparent;
      flex-shrink: 0; z-index: 1;
    }
    .ms-step.past .ms-step-dot { background: var(--ink-30); border-color: var(--ink-30); }
    .ms-step.current .ms-step-dot { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
    .ms-step-name { font-size: 10px; color: var(--ink-48); margin-top: 4px; text-align: center; white-space: nowrap; }
    .ms-step.current .ms-step-name { color: var(--primary); font-weight: 700; }
    .ms-step.past .ms-step-name { color: var(--ink-30); }
    .ms-step-date { font-size: 9px; color: var(--ink-30); text-align: center; white-space: nowrap; }
    .ms-step-line { flex: 1; height: 2px; background: var(--hairline); margin-top: 5px; min-width: 16px; }
    .ms-step.past + .ms-step-line { background: var(--ink-30); }

    /* 편집 폼 */
    .proj-card-editform { margin-top: 4px; }
    .proj-card-editform .ef-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
    .proj-card-editform .ef-label { font-size: 11px; color: var(--ink-60); flex-shrink: 0; width: 80px; }

    /* 설정 폼 */
    .settings-form { padding: 4px 0; }
    .settings-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .settings-desc { font-size: 11px; color: var(--ink-48); margin-bottom: 16px; }
    .settings-form .ef-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .settings-form .ef-label { font-size: 11px; color: var(--ink-60); flex-shrink: 0; width: 90px; }
    .color-palette { display: flex; gap: 8px; align-items: center; padding: 4px 0; }
    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .12s, border-color .12s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: var(--ink); box-shadow: 0 0 0 2px var(--canvas); transform: scale(1.1); }
    .ms-entry { display: flex; gap: 4px; margin-bottom: 4px; }
    .ms-entry .fld { flex: 1; }
    .ms-del-btn {
      background: transparent; border: 1px solid var(--hairline);
      border-radius: var(--r-sm); color: var(--ink-60);
      cursor: pointer; padding: 0 7px; font-size: 12px;
      transition: color .12s, border-color .12s;
    }
    .ms-del-btn:hover { color: var(--red); border-color: var(--red); }

    /* 검색 + 버튼 행 */
    .toprow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .searchwrap {
      flex: 1;
      position: relative;
    }

    .icon {
      width: 1em;
      height: 1em;
      display: inline-block;
      vertical-align: middle;
      fill: currentColor;
      flex-shrink: 0;
    }

    .searchwrap .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-48);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      padding: 9px 12px 9px 34px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .14s, box-shadow .14s;
    }

    #search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    #search::placeholder {
      color: var(--ink-48);
    }

    .icobtn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: var(--r-card);
      border: 1px solid var(--hairline);
      background: var(--canvas);
      color: var(--ink-60);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .13s, color .13s, background .13s;
    }

    .icobtn:hover {
      background: var(--soft);
      border-color: var(--primary);
      color: var(--primary);
    }

    .icobtn.busy {
      opacity: .5;
      pointer-events: none;
    }

    .icobtn.busy .icon {
      animation: spin 1s linear infinite;
    }

    .icobtn.primary {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }

    .icobtn.primary:hover {
      background: var(--primary-focus);
      border-color: transparent;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 필터 칩 */
    .filterbar {
      display: flex;
      gap: 6px;
      align-items: center;
      margin: 0 -14px;
      padding: 0 14px 11px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filterbar::-webkit-scrollbar {
      display: none;
    }

    .filterbar .sep {
      width: 1px;
      height: 12px;
      background: var(--hairline);
      flex-shrink: 0;
      margin: 0 2px;
    }

    .fchip {
      font-size: 12px;
      color: var(--ink-60);
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      padding: 6px 13px;
      flex-shrink: 0;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .12s, color .12s, background .12s;
    }

    .fchip:hover {
      background: var(--soft);
    }

    .fchip.on {
      background: var(--primary-dim);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* 숨김 패널 토글 */
    .hidden-section {
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      padding: 0 14px;
    }

    .hiddenbtn {
      font-size: 12px;
      color: var(--ink-60);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 0;
      display: block;
      width: 100%;
      text-align: left;
      letter-spacing: -.1px;
      font-weight: 500;
      transition: color .12s;
    }

    .hiddenbtn:hover {
      color: var(--primary);
    }

    #hidden-panel {
      display: none;
      padding-bottom: 8px;
    }

    #hidden-panel.on {
      display: block;
    }

    .hidden-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-row);
      margin: 4px 0;
      font-size: 12px;
      transition: background .12s;
    }
    .hidden-item:hover { background: var(--soft); }

    .hlabel {
      font-size: 10px;
      color: var(--ink-60);
      background: var(--soft);
      border-radius: var(--r-sm);
      padding: 2px 6px;
      flex-shrink: 0;
    }

    .htitle {
      flex: 1;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hunbtn {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: var(--r-sm);
      padding: 2px 7px;
      background: none;
      cursor: pointer;
      transition: background .12s;
    }
    .hunbtn:hover { background: var(--primary-dim); }

    .hdelbtn {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--red);
      border: 1px solid rgba(217, 48, 37, .35);
      border-radius: var(--r-sm);
      padding: 2px 7px;
      background: none;
      cursor: pointer;
    }

    /* ── 본문 ── */
    #body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 12px;
      background: transparent;
      scrollbar-width: none;
      contain: layout style;
    }

    #body::-webkit-scrollbar {
      width: 6px;
    }
    #body::-webkit-scrollbar-track {
      background: transparent;
    }
    #body::-webkit-scrollbar-thumb {
      background: var(--hairline);
      border-radius: 3px;
    }

    /* 섹션 헤더 */
    .sec {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-60);
      letter-spacing: .2px;
      text-transform: uppercase;
      margin: 14px 0 6px 2px;
    }

    .sec .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sec.red .dot {
      background: var(--red);
    }

    .sec.amber .dot {
      background: var(--amber);
    }

    .sec.blue .dot {
      background: var(--primary);
    }

    .empty {
      font-size: 13px;
      color: var(--ink-60);
      padding: 14px;
      text-align: center;
    }

    .empty-msg {
      font-size: 12px;
      color: var(--ink-60);
      padding: 16px 14px;
      text-align: center;
      line-height: 1.5;
    }
    .empty-msg small { color: var(--ink-48); }

    /* ── 메일 행 ── */
    .row {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-row);
      padding: 6px 10px;
      margin: 2px 0;
      position: relative;
      overflow: hidden;
      transition: background var(--t-fast) var(--ease), padding var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease), margin var(--t-base) var(--ease);
      /* 가로 리사이즈 시 창 너비가 바뀌면 모든 행의 텍스트가 줄바꿈을 다시 계산
         해야 해서(reflow) 세로 리사이즈보다 훨씬 무겁다. 화면 밖 행은 레이아웃
         자체를 건너뛰게 해서 리플로우 비용을 화면에 보이는 행 수로 제한한다. */
      content-visibility: auto;
      contain-intrinsic-size: auto 44px;
    }

    /* 확인(완료) 클릭 시 왼쪽으로 휙 밀려나며 사라지는 애니메이션 */
    @keyframes rowSwipeLeft {
      0%   { transform: translateX(0);      opacity: 1; }
      55%  { transform: translateX(-115%);  opacity: 0; }
      100% { transform: translateX(-115%);  opacity: 0;
             max-height: 0; margin-top: 0; margin-bottom: 0;
             padding-top: 0; padding-bottom: 0; border-width: 0; }
    }
    .row.swipe-out,
    .hidden-item.swipe-out {
      animation: rowSwipeLeft .34s cubic-bezier(.55, 0, .35, 1) forwards;
      pointer-events: none;
      overflow: hidden;
      content-visibility: visible; /* 애니메이션 중엔 레이아웃 스킵 해제 */
    }

    .row:hover {
      background: var(--soft);
      padding: 10px 12px;
      margin: -2px 0;
      box-shadow: 0 2px 8px rgba(18, 18, 24, .08);
      z-index: 1;
    }

    .row.vip {
      border-color: var(--primary);
      background: var(--primary-dim);
      border-left: 3px solid var(--primary);
      border-radius: var(--r-row) 0 0 var(--r-row);
    }

    /* 참조요청: To는 내가 아닌데 본문에 내 이름이 있는 메일 — 은은하게 강조 */
    .row.ref-req {
      background: rgba(123, 104, 238, .05);
      border-left: 2px solid rgba(123, 104, 238, .4);
    }
    .row.ref-req:hover {
      background: rgba(123, 104, 238, .09);
    }

    .row-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--soft);
    }

    .row-progress-bar {
      height: 100%;
    }

    .rowtop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .row .main {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .row .t {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      word-break: break-word;
      transition: font-size var(--t-base) var(--ease), line-height var(--t-base) var(--ease);
    }

    .row:hover .t {
      font-size: 13px;
      line-height: 1.45;
    }

    .row .t.bold {
      font-weight: 600;
    }

    .row .t .unread-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      margin-right: 6px;
      vertical-align: middle;
    }

    .row .t .imp {
      color: var(--primary);
      margin-right: 4px;
      font-size: 12px;
    }

    .row .s {
      font-size: 11px;
      color: var(--ink-48);
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      margin-top: 0;
      transition: max-height .2s ease, opacity .2s ease, margin-top .2s ease;
    }

    .row:hover .s {
      max-height: 20px;
      opacity: 1;
      margin-top: 3px;
    }

    .row .s2 {
      font-size: 11px;
      color: var(--ink-48);
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      margin-top: 0;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: max-height .22s ease, opacity .22s ease, margin-top .22s ease;
    }

    .row:hover .s2 {
      max-height: 40px;
      opacity: 1;
      margin-top: 4px;
    }

    .row .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
      gap: 4px;
    }

    .row .row-pills {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .row .row-sender {
      font-size: 11px;
      color: var(--ink-60);
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .row .memo {
      font-size: 11px;
      color: var(--ink-80);
      background: rgba(245, 166, 35, .08);
      border-left: 2px solid rgba(245, 166, 35, .6);
      border-radius: 0 5px 5px 0;
      padding: 0 10px;
      margin-top: 0;
      line-height: 1.4;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height .22s ease, opacity .2s ease, margin-top .2s ease, padding .2s ease;
    }

    .row:hover .memo {
      max-height: 60px;
      opacity: 1;
      padding: 5px 10px;
      margin-top: 7px;
    }

    /* 경과/마감 pill */
    .age,
    .dl {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      white-space: nowrap;
      letter-spacing: -.1px;
    }

    .age-crit {
      background: var(--red-bg);
      color: var(--red);
    }
    .age-red {
      background: var(--amber-bg);
      color: var(--amber);
    }
    .age-amber {
      background: var(--soft);
      color: var(--ink-48);
    }
    .age-none {
      background: var(--soft);
      color: var(--ink-48);
    }

    .dl {
      background: var(--primary-dim);
      color: var(--primary);
    }
    .dl-red {
      background: var(--red-bg);
      color: var(--red);
    }
    .dl-amber {
      background: var(--amber-bg);
      color: var(--amber);
    }

    /* 액션 버튼 */
    .rowactions {
      padding: 0;
      margin-top: 0;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      border-top: 1px solid transparent;
      transition: max-height .22s ease, opacity .2s ease, margin-top .2s ease, padding .2s ease, border-color .2s ease;
    }

    .row:hover .rowactions {
      max-height: 48px;
      opacity: 1;
      padding: 8px 0 0;
      margin-top: 8px;
      border-top-color: var(--hairline);
    }

    .btns {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .btn {
      min-width: 38px;
      height: 36px;
      border-radius: var(--r-sm);
      color: var(--ink-60);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      padding: 0 10px;
      cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
    }

    .btn:hover {
      background: var(--soft);
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn:active {
      transform: scale(.96);
    }

    .btn.star {
      color: var(--ink-30);
      border-color: transparent;
      background: transparent;
    }
    .btn.star:hover {
      color: #f5a623;
      border-color: rgba(245, 166, 35, .4);
      background: rgba(245, 166, 35, .06);
    }

    .btn.star.on {
      color: #f5a623;
      border-color: rgba(245, 166, 35, .5);
      background: rgba(245, 166, 35, .06);
    }

    .btn.note.has {
      color: #f5a623;
      border-color: rgba(245, 166, 35, .5);
      background: rgba(245, 166, 35, .06);
    }

    .proj-assign-btn {
      font-size: 16px;
      color: var(--ink-60);
      background: none;
      border: 1px solid var(--hairline);
      border-radius: var(--r-pill);
      padding: 3px 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .12s, color .12s;
    }

    .proj-assign-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    /* ── 버튼 패밀리 공통 정돈 (전환·press 피드백 일관) ── */
    .btn, .icobtn, .icon-btn, .addbtn, .rpt-btn, .hunbtn, .hdelbtn,
    .ms-del-btn, .proj-assign-btn, .addtoggle, .fchip {
      transition: background var(--t-fast) var(--ease),
                  border-color var(--t-fast) var(--ease),
                  color var(--t-fast) var(--ease),
                  box-shadow var(--t-fast) var(--ease),
                  transform var(--t-fast) var(--ease);
    }
    .btn:active, .icobtn:active, .icon-btn:active, .addbtn:active,
    .rpt-btn:active, .hunbtn:active, .hdelbtn:active, .ms-del-btn:active,
    .proj-assign-btn:active, .addtoggle:active, .fchip:active {
      transform: scale(.96);
    }
    .hdelbtn:hover { background: var(--red-bg); }

    /* 메모 편집 */
    .noteedit {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin: 8px 0 0;
    }

    .notefld {
      flex: 1;
      min-height: 44px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-sm);
      padding: 9px 11px;
      font-family: inherit;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      resize: none;
    }

    .notefld:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    /* 폼 */
    .addrow {
      display: flex;
      gap: 8px;
      margin: 8px 0;
      align-items: center;
    }

    .addrow.col {
      flex-direction: column;
      align-items: stretch;
    }

    .fld {
      flex: 1;
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
      border-radius: var(--r-sm);
      padding: 9px 11px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    .fld:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .addbtn {
      flex-shrink: 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r-pill);
      padding: 9px 18px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background .13s;
    }

    .addbtn:hover {
      background: var(--primary-focus);
    }

    .addbtn:active {
      transform: scale(.96);
    }

    .addform {
      display: none;
    }

    .addform.open {
      display: block;
    }

    .addtoggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 8px 0;
      padding: 7px 14px;
      border-radius: var(--r-pill);
      font-size: 12px;
      color: var(--primary);
      background: var(--canvas);
      border: 1px solid var(--primary);
      cursor: pointer;
      transition: background .12s;
    }

    .addtoggle.open {
      background: var(--primary-dim);
    }

    .addtoggle .pls {
      font-size: 15px;
      font-weight: 300;
    }

    /* 내 TODO */
    .row.mytodo .t::before {
      content: "";
    }

    .row.mytodo.is-done .t {
      color: var(--ink-48);
      text-decoration: line-through;
    }

    /* 상태 바 */
    .status {
      flex-shrink: 0;
      font-size: 11px;
      color: var(--ink-60);
      padding: 7px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: var(--parchment);
      border-top: 1px solid var(--hairline);
    }

    .status::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--good);
      flex-shrink: 0;
    }

    /* 하단 네비 */
    .nav {
      flex: 0 0 52px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: var(--canvas);
      border-top: 1px solid var(--hairline);
      border-radius: 0 0 var(--r-widget) var(--r-widget);
      padding: 0 8px;
      z-index: 10;
    }

    .navitem {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--ink-60);
      cursor: pointer;
      transition: color .15s;
    }

    .navitem:hover {
      color: var(--ink);
    }

    .navitem .icon {
      width: 22px;
      height: 22px;
    }

    .navitem .lb {
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
    }

    .navitem.on {
      color: var(--primary);
    }

    /* 통계/프로젝트 */
    .chart {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-card);
      padding: 14px;
      margin: 8px 0;
      box-shadow: 0 1px 0 rgba(18,18,24,.04);
    }

    .rpt-btn {
      background: var(--canvas);
      color: var(--primary);
      font-family: inherit;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: var(--r-pill);
      border: 1px solid var(--primary);
      cursor: pointer;
      transition: background .12s;
    }

    .rpt-btn:hover {
      background: var(--soft);
    }

    .rpt-btn:active {
      transform: scale(.96);
    }

    .urgent-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--c-reply, #d93025);
      background: rgba(217, 48, 37, .06);
      border: 1px solid rgba(217, 48, 37, .2);
      border-radius: var(--r-pill);
      padding: 8px 12px;
      margin-bottom: 14px;
    }
    .urgent-strip .icon { width: 15px; height: 15px; }

    /* 팝업 메뉴 */
    .snooze-menu,
    .proj-menu {
      position: fixed;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--r-card);
      box-shadow: 0 2px 8px rgba(18, 18, 24, .08), 0 8px 24px rgba(18, 18, 24, .06);
      z-index: 9999;
      overflow: hidden;
      min-width: 110px;
    }

    .si,
    .pi {
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      border-bottom: 1px solid var(--hairline);
      transition: background .1s;
    }

    .si:last-child,
    .pi:last-child {
      border-bottom: none;
    }

    .si:hover,
    .pi:hover {
      background: var(--soft);
    }

    /* 완료 배지 */
    .done-badge {
      display: none;
      font-size: 11px;
      color: var(--good);
      background: rgba(30, 142, 62, .08);
      border-radius: var(--r-pill);
      padding: 2px 8px;
      font-weight: 600;
    }
  </style>
</head>

  <div class="app">

          <div class="n" id="c-사내">0</div>

      <div class="proj-cards" id="proj-cards" style="display:none">

  <!-- 리사이즈 핸들 (frameless 창용) -->
  <script>
    "use strict";
    var AGING_CRIT = 14, AGING_RED = 7, AGING_AMBER = 3;
    var CARD_COLORS = {
      blue: { name: '블루', main: '#2383e2', dim: 'rgba(35, 131, 226, .4)', bg: 'rgba(35, 131, 226, .06)' },
      red: { name: '레드', main: '#d93025', dim: 'rgba(217, 48, 37, .4)', bg: 'rgba(217, 48, 37, .06)' },
      amber: { name: '엠버', main: '#f29900', dim: 'rgba(242, 153, 0, .4)', bg: 'rgba(242, 153, 0, .06)' },
      green: { name: '그린', main: '#1e8e3e', dim: 'rgba(30, 142, 62, .4)', bg: 'rgba(30, 142, 62, .06)' },
      purple: { name: '퍼플', main: '#7b68ee', dim: 'rgba(123, 104, 238, .4)', bg: 'rgba(123, 104, 238, .06)' },
      pink: { name: '핑크', main: '#f472b6', dim: 'rgba(244, 114, 182, .4)', bg: 'rgba(244, 114, 182, .06)' }
    };

    var state = {
      data: null, filter: null, view: "홈", search: "",
      seenReplies: null, seenAged: null,
      rules: {},
      openForm: null, sort: "delay",
      q: { unread: false, vip: false, important: false },
      noteOpen: null, openProjCard: null, projCardTab: {},
      authRequired: false, hiddenOpen: false,
      allTab: "받은메일",
      projFilter: null
    };

    function icon(id) { return '<svg class="icon"><use href="#' + id + '"/></svg>'; }
    function esc(s) {
      return (s == null ? "" : String(s))
        .replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; });
    }
    function matches() {
      if (!state.search) return true;
      return Array.prototype.join.call(arguments, " ").toLowerCase().indexOf(state.search) >= 0;
    }
    function trunc(s, n) {
      s = (s == null ? "" : String(s)).replace(/\s+/g, " ").trim();
      n = n || 120;
      return s.length > n ? s.slice(0, n) + "…" : s;
    }

    function agingClass(days) {
      if (days == null) return "";
      if (days >= AGING_CRIT) return "age-crit";
      if (days >= AGING_RED) return "age-red";
      if (days >= AGING_AMBER) return "age-amber";
      return "";
    }
    function agingBold(days) { return days != null && days >= AGING_CRIT; }

    function agePill(days) {
      if (days == null) return "";
      var cls = agingClass(days) || "age-none";
      return '<span class="age ' + cls + '">' + days + '일</span>';
    }
    function dlPill(days) {
      if (days == null) return "";
      var cls = "dl", label;
      if (days < 0) { label = "D+" + (-days) + " 지남"; cls += " dl-red"; }
      else { label = "D-" + days; if (days <= 1) cls += " dl-red"; else if (days <= 3) cls += " dl-amber"; }
      return '<span class="' + cls + '">' + label + '</span>';
    }
    function elapsedDays(it) {
      if (it.경과일 != null) return it.경과일;
      var d = it.날짜; if (!d) return null;
      var t = Date.parse(String(d).slice(0, 10));
      if (isNaN(t)) return null;
      return Math.max(0, Math.floor((Date.now() - t) / 86400000));
    }
    function delayPill(it) {
      if (it.마감D != null && it.마감D < 0)
        return '<span class="dl dl-red">D+' + (-it.마감D) + '</span>';
      return agePill(elapsedDays(it));
    }
    function delayValue(it) {
      if (it.마감D != null && it.마감D < 0) return 100000 + (-it.마감D);
      var e = elapsedDays(it); return e == null ? -1 : e;
    }
    function upcomingDl(it) { return (it.마감D != null && it.마감D >= 0) ? it.마감D : null; }
    function replySub(t) { return (t.건수 || "") + "건 · 최근 " + (t.최근 || ""); }
    function extractName(s) {
      if (!s) return '';
      var m = s.match(/^([^<@]+?)\s*</);
      if (m) return m[1].trim();
      return s.split('@')[0] || s;
    }

    function applyQ(list) {
      return list.filter(function (t) {
        if (state.q.unread && !t.미읽음) return false;
        if (state.q.vip && !t.vip) return false;
        if (state.q.important && !t.중요) return false;
        return true;
      });
    }
    function applySort(list) {
      var a = list.slice();
      if (state.sort === "recent")
        a.sort(function (x, y) { return String(y.날짜 || "").localeCompare(String(x.날짜 || "")); });
      else if (state.sort === "deadline")
        a.sort(function (x, y) { return (x.마감D == null ? 9999 : x.마감D) - (y.마감D == null ? 9999 : y.마감D); });
      else
        a.sort(function (x, y) { return delayValue(y) - delayValue(x); });
      a.sort(function (x, y) { return (y.중요 ? 1 : 0) - (x.중요 ? 1 : 0); });
      return a;
    }

    function rowHtml(o) {
      var btns = "";
      if (o.importantKey != null)
        btns += '<div class="btn star' + (o.important ? " on" : "") + '" data-act="important" data-key="' + esc(o.importantKey) + '">' + icon(o.important ? 'ph-star-fill' : 'ph-star') + '</div>';
      if (o.doneKey != null)
        btns += '<div class="btn" data-act="done" data-key="' + esc(o.doneKey) + '">' + icon('ph-check') + '</div>';
      if (o.noteKey != null)
        btns += '<div class="btn note' + (o.note ? " has" : "") + '" data-act="note" data-key="' + esc(o.noteKey) + '">' + icon('ph-pencil-simple') + '</div>';
      if (o.snoozeKey != null)
        btns += '<div class="btn" data-act="snooze" data-key="' + esc(o.snoozeKey) + '">' + icon('ph-bell') + '</div>';
      if (o.senderEmail != null)
        btns += '<button class="proj-assign-btn" data-act="proj-assign" data-email="' + esc(o.senderEmail) + '">' + icon('ph-tag') + '</button>';

      var dot = o.unread ? '<span class="unread-dot"></span>' : "";
      var imp = (o.important || o.loop)
        ? '<span class="imp">' + (o.loop && !o.important ? icon('ph-arrows-clockwise') : icon('ph-star-fill')) + '</span>' : "";
      var tcls = "t" + (o.bold ? " bold" : "");
      var sub = o.sub ? '<div class="s">' + esc(o.sub) + '</div>' : "";
      var sub2 = o.sub2 ? '<div class="s2">' + esc(o.sub2) + '</div>' : "";
      var memo = o.note ? '<div class="memo">' + icon('ph-pencil-simple') + ' ' + esc(o.note) + '</div>' : "";
      var link = o.link ? ' data-link="' + esc(o.link) + '"' : "";
      var pill = (o.urgent ? '<span class="dl dl-red">긴급</span>' : "")
        + (o.delayHtml != null ? o.delayHtml : "")
        + (o.dlDays != null ? dlPill(o.dlDays) : "")
        + (o.ageDays != null ? agePill(o.ageDays) : "");
      var rowCls = "row" + (o.vip ? " vip" : "") + (o.refReq ? " ref-req" : "");

      var progress = "";
      if (o.progressDays != null) {
        var pct = Math.min(100, Math.round((o.progressDays / 14) * 100));
        var grad = o.progressDays >= 14
          ? "linear-gradient(90deg,#d93025,#f5b4b4)"
          : o.progressDays >= 7
            ? "linear-gradient(90deg,#f29900,#d93025)"
            : o.progressDays >= 3
              ? "linear-gradient(90deg,#2383e2,#f29900)"
              : "linear-gradient(90deg,#2383e2,#7db8f0)";
        progress = '<div class="row-progress"><div class="row-progress-bar" style="width:' + pct + '%;background:' + grad + '"></div></div>';
      }

      var senderName = o.senderName ? extractName(o.senderName) : '';
      var senderEl = senderName ? '<div class="row-sender">' + esc(senderName) + '</div>' : '';
      var html = '<div class="' + rowCls + '">'
        + '<div class="rowtop">'
        + '<div class="main"' + link + '><div class="' + tcls + '">' + imp + dot + esc(o.title) + '</div>' + sub + sub2 + memo + '</div>'
        + '<div class="right">' + (pill ? '<div class="row-pills">' + pill + '</div>' : '') + senderEl + '</div>'
        + '</div>'
        + (btns ? '<div class="rowactions"><div class="btns">' + btns + '</div></div>' : '')
        + progress
        + '</div>';

      if (o.noteKey != null && state.noteOpen === o.noteKey) {
        html += '<div class="noteedit">'
          + '<textarea class="notefld" id="notefld-active" placeholder="메모 입력">' + esc(o.note || "") + '</textarea>'
          + '<button class="addbtn" data-act="note-save" data-key="' + esc(o.noteKey) + '">저장</button>'
          + '</div>';
      }
      return html;
    }

    function secHtml(t, cls) {
      return '<div class="sec ' + cls + '"><span class="dot"></span>' + esc(t) + '</div>';
    }
    function emptyHtml(t) { return '<div class="empty">' + esc(t) + '</div>'; }

    function addToggleHtml(which, label, inner) {
      var open = state.openForm === which;
      return '<div class="addtoggle' + (open ? " open" : "") + '" data-act="toggleform" data-form="' + which + '">'
        + icon(open ? 'ph-minus' : 'ph-plus') + esc(label) + '</div>'
        + '<div class="addform' + (open ? " open" : "") + '">' + inner + '</div>';
    }

    /* ── 렌더 ── */
    function renderFilterBar() {
      var fb = document.getElementById("filterbar");
      if (!fb) return;
      if (state.view !== "홈") { fb.style.display = "none"; fb.innerHTML = ""; return; }
      fb.style.display = "flex";
      var sorts = [["delay", "지연순"], ["recent", "최신순"], ["deadline", "마감순"]];
      var qs = [["unread", "미읽음"], ["important", "중요"]];
      var h = sorts.map(function (s) {
        return '<div class="fchip' + (state.sort === s[0] ? " on" : "") + '" data-sort="' + s[0] + '">' + s[1] + '</div>';
      }).join("");
      h += '<div class="sep"></div>';
      h += qs.map(function (q) {
        return '<div class="fchip' + (state.q[q[0]] ? " on" : "") + '" data-q="' + q[0] + '">' + q[1] + '</div>';
      }).join("");
      fb.innerHTML = h;
    }

    function render() {
      var d = state.data; if (!d) return;
      document.getElementById("c-외부요청").textContent = d.counts.외부요청;
      document.getElementById("c-사내").textContent = d.counts.사내;
      document.getElementById("c-미회신").textContent = d.counts.미회신;

      document.querySelectorAll(".card").forEach(function (c) {
        c.classList.toggle("on", c.getAttribute("data-k") === state.filter);
      });
      document.querySelectorAll(".navitem").forEach(function (n) {
        n.classList.toggle("on", n.getAttribute("data-v") === state.view);
      });

      var isHome = state.view === "홈";
      var isProj = state.view === "프로젝트";
      var isSettings = state.view === "설정";
      var isSearch = isHome || state.view === "전체";
      document.getElementById("searchwrap").style.display = isSearch ? "flex" : "none";
      document.getElementById("fetchbtn").style.display = isHome ? "flex" : "none";
      document.querySelector(".cards").style.display = isHome ? "grid" : "none";
      document.getElementById("proj-cards").style.display = isProj ? "grid" : "none";
      if (isProj) {
        document.getElementById("pc-메모").textContent = (d.memos || []).length;
        document.getElementById("pc-프로젝트").textContent = (d.project_cards || []).length;
        document.getElementById("pc-할일").textContent = (d.mytodos || []).filter(function (t) { return !t.done; }).length;
        document.querySelectorAll("#proj-cards .card").forEach(function (c) {
          c.classList.toggle("on", c.getAttribute("data-pf") === state.projFilter);
        });
      }
      renderFilterBar();

      var html = "";
      if (state.view === "프로젝트") html = renderProjects(d);
      else if (state.view === "전체") html = renderAll(d);
      else if (state.view === "설정") { renderSettingsAsync(); return; }
      else html = renderHome(d);

      document.getElementById("body").innerHTML = html;
      document.getElementById("body").scrollTop = 0;
      document.getElementById("status").textContent = "갱신 " + (d.갱신시각 || "-");
      if (document.getElementById("ch-delay")) drawCharts(d);
      if (state.view === "전체" && state.hiddenOpen) loadHidden();
    }

    function renderHome(d) {
      var html = "";
      if (state.filter === "외부요청") return html + renderTodoOnly(d, false);
      if (state.filter === "사내") return html + renderTodoOnly(d, true);
      if (state.filter === "미회신") return html + renderRepliesOnly(d);
      return html + renderDefault(d);
    }

    function memoElapsed(s) {
      if (!s) return null;
      var t = Date.parse(s); if (isNaN(t)) return null;
      return Math.floor((Date.now() - t) / 86400000);
    }
    function memoDday(s) {
      if (!s) return null;
      var t = Date.parse(s); if (isNaN(t)) return null;
      return Math.floor((t - Date.now()) / 86400000);
    }
    function memoHtml(d) {
      var items = d.memos || [];
      var html = secHtml("메모", "blue");
      items.forEach(function (it) {
        var ep = memoElapsed(it.start), dp = memoDday(it.deadline);
        var ePill = ep != null ? '<span class="dl dl-amber">경과 ' + ep + '일</span>' : "";
        var dPill = "";
        if (dp != null) {
          if (dp < 0) dPill = '<span class="dl dl-red">D+' + (-dp) + '</span>';
          else if (dp === 0) dPill = '<span class="dl dl-red">D-Day</span>';
          else dPill = '<span class="dl">D-' + dp + '</span>';
        }
        var sub = (it.start || "") + (it.deadline ? " → " + it.deadline : "");
        html += '<div class="row"><div class="rowtop"><div class="main"><div class="t">' + esc(it.text) + '</div>'
          + (sub ? '<div class="s">' + esc(sub) + '</div>' : '')
          + '</div><div class="right">' + ePill + dPill + '</div></div>'
          + '<div class="rowactions"><div class="btns"><div class="btn" data-act="memo-del" data-id="' + esc(it.id) + '">' + icon('ph-x') + '</div></div></div>'
          + '</div>';
      });
      if (!items.length) html += emptyHtml("등록된 메모가 없습니다.");
      var today = new Date().toISOString().slice(0, 10);
      html += addToggleHtml("memo", "메모 추가",
        '<div class="addrow col">'
        + '<input class="fld" id="memo-text" type="text" placeholder="메모 내용">'
        + '<button class="addbtn" data-act="memo-add">추가</button>'
        + '</div>');
      return html;
    }

    function myTodoHtml(d) {
      var items = d.mytodos || [];
      var html = secHtml("내가 추가한 할 일", "blue");
      items.forEach(function (it) {
        var doneCls = it.done ? " is-done" : "";
        var dp = memoDday(it.deadline);
        var dlPill = "";
        if (dp != null) {
          if (dp < 0) dlPill = '<span class="dl dl-red">D+' + (-dp) + '</span>';
          else if (dp === 0) dlPill = '<span class="dl dl-red">D-Day</span>';
          else if (dp <= 3) dlPill = '<span class="dl dl-amber">D-' + dp + '</span>';
          else dlPill = '<span class="dl">D-' + dp + '</span>';
        }
        var btns = (!it.done ? '<div class="btn" data-act="todo-done" data-id="' + esc(it.id) + '">' + icon('ph-check') + '</div>' : "")
          + '<div class="btn" data-act="todo-del" data-id="' + esc(it.id) + '">' + icon('ph-x') + '</div>';
        html += '<div class="row mytodo' + doneCls + '"><div class="rowtop"><div class="main"><div class="t">' + esc(it.text) + '</div></div>'
          + '<div class="right">' + dlPill + '</div></div>'
          + '<div class="rowactions"><div class="btns">' + btns + '</div></div></div>';
      });
      if (!items.length) html += emptyHtml("추가한 할 일이 없습니다.");
      html += addToggleHtml("todo", "할 일 추가",
        '<div class="addrow col">'
        + '<input class="fld" id="mytodo-in" type="text" placeholder="할 일 입력">'
        + '<div class="addrow" style="margin:0;gap:6px;">'
        + '<label style="font-size:11px;color:var(--ink-48);flex-shrink:0;">마감</label>'
        + '<input class="fld" id="mytodo-dl" type="date">'
        + '</div>'
        + '<button class="addbtn" data-act="todo-add">추가</button>'
        + '</div>');
      return html;
    }

    // 단일 TODO 행 — 본문에 내 이름이 있는데 To 수신자가 내가 아니면(참조요청) 은은한 강조
    function todoRow(t) {
      var cnt = (t.건수 && t.건수 > 1) ? " · " + t.건수 + "건" : "";
      return rowHtml({ title: t.제목, unread: t.미읽음, vip: t.vip, important: t.중요, bold: agingBold(elapsedDays(t)), sub: (t.보낸사람 || "") + " · " + (t.날짜 || "") + cnt, sub2: trunc(t.요약, 120), link: t.링크, delayHtml: delayPill(t), dlDays: upcomingDl(t), progressDays: elapsedDays(t), note: t.메모, importantKey: t.제목, doneKey: t.제목, noteKey: t.제목, snoozeKey: t.제목, loop: t.루프, senderEmail: t.보낸사람 || null, senderName: t.보낸사람 || null, refReq: !!t.참조요청, urgent: !!t.긴급 });
    }

    // isInternal=true면 사내(내부 도메인 발신자), false면 외부(To는 내가 아니지만 본문에 나를 언급 = 참조요청)
    function todoList(d, isInternal) {
      return applySort(applyQ(d.todos.filter(function (t) {
        if (isInternal) { if (!t.내부여부) return false; }
        else { if (t.내부여부 || !t.참조요청) return false; }
        return matches(t.제목, t.보낸사람, t.요약);
      })));
    }

    // 한 그룹(외부 요청 또는 사내)을 섹션 헤더 + 행으로 렌더
    function renderTodoGroup(d, isInternal) {
      var title = isInternal ? "Internal" : "Mentioned";
      var html = secHtml(title, isInternal ? "blue" : "amber");
      var list = todoList(d, isInternal);
      if (list.length) list.forEach(function (t) { html += todoRow(t); });
      else html += emptyHtml(title + " 항목이 없습니다.");
      return html;
    }

    // 기본 홈(카드 미선택): 긴급은 각 분류 카드에 긴급 pill 로 표시되므로, 랜딩은 통계 차트를 보여준다.
    function renderDefault(d) {
      var n = (d.counts && d.counts.긴급) || 0;

    // ── 아코디언 헬퍼 ──────────────────────────────────────────
    function renderMilestoneSteps(card) {
      var milestones = card.milestones || [];
      if (!milestones.length) return '<div class="empty-msg" style="font-size:11px;">일정이 없습니다.</div>';
      var currentName = card.stage && card.stage.current ? card.stage.current.name : null;
      var currentIdx = -1;
      milestones.forEach(function(m, i) { if (m.name === currentName) currentIdx = i; });
      var steps = milestones.map(function(m, i) {
        var cls = i < currentIdx ? 'ms-step past' : (i === currentIdx ? 'ms-step current' : 'ms-step future');
        var dateStr = m.date ? '<span class="ms-step-date">' + esc(m.date) + '</span>' : '';
        return '<div class="' + cls + '"><span class="ms-step-dot"></span><span class="ms-step-name">' + esc(m.name) + '</span>' + dateStr + '</div>';
      }).join('<div class="ms-step-line"></div>');
      return '<div class="ms-stepper">' + steps + '</div>';
    }

    function renderDynProjectCards(d) {
      if (!d.project_cards || !d.project_cards.length) {
        return '<div class="empty-msg">프로젝트 카드가 없습니다. 추가 버튼을 눌러 시작하세요.</div>';
      }
      return d.project_cards.map(function(card) {
        var isOpen = state.openProjCard === card.id;
        var activeTab = state.projCardTab[card.id] || 'mail';

        var cConf = CARD_COLORS[colorVal] || CARD_COLORS.blue;
        var styleAttr = ' style="--pc-accent: ' + cConf.main + '; --pc-accent-dim: ' + cConf.dim + '; --pc-accent-bg: ' + cConf.bg + ';"';

        // 현재 단계 배지
        var stageBadge = '';
        if (card.stage) {
          if (card.stage.current) stageBadge = '<span class="stage-badge">' + esc(card.stage.current.name) + '</span>';
          else if (card.stage.all_future) stageBadge = '<span class="stage-badge future">예정</span>';
          if (card.stage.next && card.stage.next.ddays != null) stageBadge += dlPill(card.stage.next.ddays);
        }

        var chevron = '<span class="pc-chevron">' + icon('ph-caret-down') + '</span>';
        var header = '<div class="pc-header" data-act="toggle-proj-card" data-id="' + esc(card.id) + '">'
          + '<span class="pc-name">' + esc(card.name) + '</span>'
          + stageBadge + chevron
          + '</div>';

        if (!isOpen) return '<div class="pc-accordion"' + styleAttr + '>' + header + '</div>';

        // 탭 바
        var tabs = ['mail','schedule','info'];
        var tabLabels = {mail:'메일', schedule:'일정', info:'정보'};
        var tabBar = '<div class="pc-tabbar">' + tabs.map(function(t) {

        }).join('') + '</div>';

        var body = '';
        if (activeTab === 'mail') {
          var mails = (card.mails || []).slice(0, 20);
          body = mails.length
            ? mails.map(function(m) {
                return rowHtml({ title: m.제목 || '', sub: (m.보낸사람 || '') + (m.날짜 ? ' · ' + m.날짜 : ''), link: m.링크 || null, unread: m.미읽음 || false });
              }).join('')
            : '<div class="empty-msg">수집된 메일이 없습니다.<br><small>정보 탭에서 발신자를 추가하세요.</small></div>';
        } else if (activeTab === 'schedule') {
          var ms = card.milestones || [];
          var msRows = ms.map(function(m, i) {

              + '<button class="ms-del-btn" data-act="ms-del-row" data-idx="' + i + '">' + icon('ph-x') + '</button>'
              + '</div>';
          }).join('');
          body = renderMilestoneSteps(card)
            + '<div class="pc-section-title">일정 편집</div>'
            + '<div class="proj-card-editform" data-edit-id="' + esc(card.id) + '">'
            + '<div id="pcef-ms-list">' + msRows + '</div>'
            + '<button class="addbtn" style="font-size:11px;padding:4px 10px;margin:6px 0;" data-act="ms-add-row">' + icon('ph-plus') + ' 단계 추가</button>'
            + '<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:4px;">'
            + '<button class="addbtn" data-act="save-proj-schedule" data-id="' + esc(card.id) + '">저장</button>'
            + '</div></div>';
        } else {
          var colorSelected = card.color || 'blue';
          var colorRow = '<div class="ef-row"><span class="ef-label">카드 색상</span>'
            + '<div class="color-palette">'
            + Object.keys(CARD_COLORS).map(function(cKey) {
                var c = CARD_COLORS[cKey];
                var activeCls = cKey === colorSelected ? ' active' : '';
                return '<div class="color-swatch' + activeCls + '" data-color="' + cKey + '" style="background-color:' + c.main + ';" title="' + c.name + '"></div>';
              }).join('')
            + '</div></div>';

          body = '<div class="proj-card-editform" data-edit-id="' + esc(card.id) + '">'
            + '<div class="ef-row"><span class="ef-label">프로젝트명</span>'

            + '<div class="ef-row"><span class="ef-label">발신자 이메일</span>'
            + '<input class="fld" id="pcef-senders" type="text" placeholder="예: kim@corp.kr, lee@example.com (콤마 구분)" value="' + esc((card.senders || []).join(', ')) + '"></div>'

            + '<input class="fld" id="pcef-keywords" type="text" placeholder="예: 계약서, 견적, 납품 (콤마 구분)" value="' + esc((card.keywords || []).join(', ')) + '"></div>'
            + colorRow
            + '<div class="ef-row" style="margin-top:4px;justify-content:space-between;">'
            + '<button class="addbtn" style="background:var(--red);" data-act="del-proj-card" data-id="' + esc(card.id) + '">삭제</button>'
            + '<button class="addbtn" data-act="save-proj-info" data-id="' + esc(card.id) + '">저장</button>'
            + '</div></div>';
        }

        return '<div class="pc-accordion open"' + styleAttr + '>' + header + tabBar + '<div class="pc-body">' + body + '</div></div>';
      }).join('');
    }

    function renderProjects(d) {
      var pf = state.projFilter;
      var html = "";

      if (!pf || pf === "메모") html += memoHtml(d);
      if (!pf || pf === "할일") html += myTodoHtml(d);

          '<div class="addrow col">'

    function renderAll(d) {
      var CAP = 200, table = d.table || [];
      var q = table.filter(function (r) { return matches(r.제목, r.상대, r.요약); });
      var received = q.filter(function (r) { return r.구분 === "받음" || r.구분 === "받은메일"; });
      var sent = q.filter(function (r) { return r.구분 === "보낸메일" || r.구분 === "보냄"; });
      var tab = state.allTab;
      var list = tab === "보낸메일" ? sent : received;

      var oa = d.only_all || { internal: [], mentioned: [], reply: [] };
      var uncat = (oa.internal || []).length + (oa.mentioned || []).length + (oa.reply || []).length;

      var html = '<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">'
        + '<button class="fchip' + (tab === "받은메일" ? " on" : "") + '" data-act="alltab" data-tab="받은메일">받은메일 (' + received.length + ')</button>'
        + '<button class="fchip' + (tab === "보낸메일" ? " on" : "") + '" data-act="alltab" data-tab="보낸메일">보낸메일 (' + sent.length + ')</button>'
        + '<button class="fchip' + (tab === "미분류" ? " on" : "") + '" data-act="alltab" data-tab="미분류" title="홈 섹션에 안 뜨고 전체에만 있는 받은메일">미분류 (' + uncat + ')</button>'
        + '<button class="rpt-btn" data-act="report" style="margin-left:auto;">' + icon('ph-file-text') + ' 주간 리포트</button>'
        + '<button class="rpt-btn" data-act="review">' + icon('ph-calendar-blank') + ' 주간 회고</button>'

        + (state.hiddenOpen ? "숨긴 항목 닫기 ▴" : "전체에서 숨긴 항목 보기 ▾") + '</button>'
        + '</div>'
        + '<div id="hidden-panel"' + (state.hiddenOpen ? ' class="on"' : '') + '></div>';

      function mailRow(r) {
        var isLoop = (r.건수 || 0) >= 4;
        var dot = r.미읽음 ? '<span class="unread-dot"></span>' : "";
        var cnt = r.건수 > 1 ? '<span style="font-size:10px;color:var(--ink-48);margin-left:4px;">' + r.건수 + '건</span>' : "";
        var loop = isLoop ? '<svg class="icon" style="width:15px;height:15px;color:#d93025;margin-left:4px;"><use href="#ph-arrows-clockwise"/></svg>' : "";
        var rs = isLoop ? ' style="background:linear-gradient(135deg,rgba(217,48,37,.07),rgba(217,48,37,.02));border-color:rgba(217,48,37,.3);"' : "";
        var tgs = r.태그 || [];
        var key = esc(r.제목 || "");
        function tagBtn(tag, label) {
          var on = tgs.indexOf(tag) >= 0;
          return '<div class="btn' + (on ? " on" : "") + '" data-act="tag-toggle" data-tag="' + tag + '" data-key="' + key + '" title="' + tag + (on ? " 해제" : " 설정") + '">' + label + '</div>';
        }
        var btns = tagBtn("미읽음", "읽") + tagBtn("TODO", "T") + tagBtn("미회신", "↩");
        return '<div class="row"' + rs + '><div class="rowtop"><div class="main"' + (r.링크 ? ' data-link="' + esc(r.링크) + '"' : '') + '>'
          + '<div class="t' + (r.미읽음 ? " bold" : "") + '">' + dot + esc(r.제목) + loop + cnt + '</div>'
          + '<div class="s">' + esc((r.상대 || "") + " · " + (r.날짜 || "")) + '</div>'
          + '</div></div>'
          + '<div class="rowactions"><div class="btns">' + btns + '</div></div>'
          + '</div>';
      }

      if (tab === "미분류") {
        // 홈 액션 섹션에 안 뜨고 전체에만 있는 받은메일 → 3분류
        function oaSection(title, cls, arr) {
          var h = secHtml(title, cls);
          var items = applyQ((arr || []).filter(function (t) { return matches(t.제목, t.보낸사람, t.요약); }));
          if (items.length) items.forEach(function (t) {
            h += rowHtml({ title: t.제목, sub: (t.보낸사람 || "") + " · " + (t.날짜 || ""), sub2: trunc(t.요약, 120),
              unread: t.미읽음, link: t.링크, vip: t.vip, important: t.중요, note: t.메모,
              importantKey: t.제목, doneKey: t.제목, noteKey: t.제목, snoozeKey: t.제목, loop: t.루프,

          });
          else h += emptyHtml(title + " 항목이 없습니다.");
          return h;
        }
        html += oaSection("Internal (사내)", "blue", oa.internal);
        html += oaSection("Mentioned (참조)", "amber", oa.mentioned);
        html += oaSection("미회신 (회신·확인 대기)", "red", oa.reply);
        return html;
      }

      if (list.length) list.slice(0, CAP).forEach(function (r) { html += mailRow(r); });
      else html += emptyHtml(tab + "이 없습니다.");
      return html;
    }

    function delayRows(d) {

    function drawDelayBars(id, rows) {
      var cv = document.getElementById(id); if (!cv) return;
      var dpr = window.devicePixelRatio || 1;
      var rh = 28;
      cv.style.display = "block";
      cv.style.width = "100%";
      var cssW = cv.clientWidth || (cv.parentNode && cv.parentNode.clientWidth) || 320;
      var cssH = rows.length ? rows.length * rh + 12 : 40;
      cv.style.height = cssH + "px";
      cv.width = Math.round(cssW * dpr);
      cv.height = Math.round(cssH * dpr);
      var ctx = cv.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, cssW, cssH);
      if (!rows.length) return;
      var W = cssW, maxv = 1;
      rows.forEach(function (r) { if (r.일 > maxv) maxv = r.일; });
      var barMax = W * 0.32;
      ctx.font = "12px 'Malgun Gothic',sans-serif";
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      rows.forEach(function (r, i) {
        var y = 6 + i * rh, bw = (r.일 / maxv) * barMax;
        var col = r.일 >= 14 ? CHART_COL.red : r.일 >= 7 ? CHART_COL.amber : CHART_COL.blue;
        ctx.globalAlpha = .18; ctx.fillStyle = col; ctx.fillRect(2, y + 4, Math.max(4, bw), rh - 10);
        ctx.globalAlpha = 1; ctx.fillStyle = col; ctx.fillRect(2, y + 4, 4, rh - 10);
        var label = String(r.제목 || ""); if (label.length > 16) label = label.slice(0, 15) + "…";
        ctx.fillStyle = CHART_COL.ink;
        ctx.fillText(label + "  " + r.일 + "일", 2 + barMax + 12, y + rh / 2);
      });
    }

    /* ── 중앙 API 래퍼 (Phase 2.3) ──
       모든 pywebview 호출을 한 곳에서 감싸 실패 시 콘솔+상태바 토스트로 표면화하고,
       낙관적 업데이트에는 롤백 훅을 제공한다. 기능(메서드) 부재는 오류가 아니라
       기존 `if (api.xxx)` 가드와 동일하게 조용히 무시한다(토스트 없음).
       실패/부재는 __handled 표식으로 reject 하여 성공 .then 을 건너뛰게 하고,
       전역 unhandledrejection 핸들러가 표식 있는 reject 의 콘솔 경고만 억제한다. */
    function setStatus(msg) { var st = document.getElementById("status"); if (st) st.textContent = msg; }
    function callApi(method, args, opts) {
      opts = opts || {};
      var api = window.pywebview && window.pywebview.api;
      if (!api || typeof api[method] !== "function") {
        return Promise.reject({ __handled: true, unavailable: true, method: method });
      }
      var ret;
      try { ret = api[method].apply(api, args || []); }
      catch (e) { ret = Promise.reject(e); }
      return Promise.resolve(ret).catch(function (err) {
        console.error("[callApi] " + method + " 실패:", err);
        if (!opts.silent) setStatus(opts.failMsg || ((opts.label || "작업") + " 실패"));
        if (typeof opts.rollback === "function") { try { opts.rollback(); } catch (e2) { } }
        return Promise.reject({ __handled: true, err: err });
      });
    }
    // 낙관적 제거 + 실패 시 스냅샷 복원 (punch-list #4). 성공하면 백엔드 뷰로 재동기화.
    function optimisticRemove(key, method, methodArgs, opts) {
      opts = opts || {};
      var snapshot = state.data ? JSON.parse(JSON.stringify(state.data)) : null;
      removeKeyOptimistic(key);
      return callApi(method, methodArgs, {
        label: opts.label,
        failMsg: (opts.label || "작업") + " 실패 — 되돌립니다",
        rollback: function () { if (snapshot) { state.data = snapshot; render(); } }
      }).then(function () { refresh(); }, function () { });
    }
    // callApi 는 실패를 이미 콘솔+토스트로 처리한다. 표식된 reject 의 Uncaught 경고만 억제.
    window.addEventListener("unhandledrejection", function (e) {
      if (e.reason && e.reason.__handled) e.preventDefault();
    });

      menu.style.right = (window.innerWidth - rect.right) + "px";
      setTimeout(function () { document.addEventListener("click", closeSnoozeMenu, { once: true }); }, 0);
    }
    function closeSnoozeMenu() { var m = document.getElementById("snooze-menu"); if (m) m.remove(); }

    function showProjMenu(rect, email) {
      closeProjMenu();
      var api = window.pywebview && window.pywebview.api;
      var projectsPromise = (api && api.get_projects) ? api.get_projects() : Promise.resolve([]);
      projectsPromise.then(function (projects) {
        var menu = document.createElement("div");
        menu.className = "proj-menu"; menu.id = "proj-menu";
        (projects || []).forEach(function (p) {
          var pi = document.createElement("div"); pi.className = "pi"; pi.textContent = p;
          pi.setAttribute("data-act", "proj-do"); pi.setAttribute("data-proj", p); pi.setAttribute("data-email", email);
          menu.appendChild(pi);
        });
        // 새 프로젝트 인라인 입력
        var row = document.createElement("div"); row.className = "pi pi-new";
        var inp = document.createElement("input");
        inp.type = "text"; inp.placeholder = "새 프로젝트…"; inp.id = "proj-menu-inp";
        inp.style.cssText = "width:90px;font-size:11px;border:none;background:transparent;outline:none;color:inherit;";
        var ok = document.createElement("span"); ok.textContent = "✓";
        ok.style.cssText = "cursor:pointer;margin-left:4px;color:var(--primary);";
        ok.setAttribute("data-act", "proj-do-new"); ok.setAttribute("data-email", email);
        row.appendChild(inp); row.appendChild(ok);
        menu.appendChild(row);
        var bodyEl = document.getElementById("body") || document.body;
        bodyEl.appendChild(menu);
        menu.style.top = (rect.bottom + 4) + "px";
        menu.style.right = (window.innerWidth - rect.right) + "px";
        inp.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.stopPropagation(); ok.click(); } if (e.key === "Escape") { closeProjMenu(); } });
        setTimeout(function () { document.addEventListener("click", closeProjMenu, { once: true }); }, 0);
      });
    }
    function closeProjMenu() { var m = document.getElementById("proj-menu"); if (m) m.remove(); }

    function loadHidden() {
      var api = window.pywebview && window.pywebview.api; if (!api || !api.get_hidden) return;
      var panel = document.getElementById("hidden-panel"); if (!panel) return;
      api.get_hidden().then(function (items) {
        if (!items || !items.length) {
          panel.innerHTML = '<div class="empty" style="font-size:12px;padding:6px 0;">숨긴 항목이 없습니다.</div>'; return;
        }
        panel.innerHTML = items.map(function (it) {
          return '<div class="hidden-item">'
            + '<span class="hlabel">' + esc(it.label) + '</span>'
            + '<span class="htitle">' + esc(it.key) + '</span>'
            + '<button class="hunbtn" data-act="unhide" data-key="' + esc(it.key) + '" data-kind="' + esc(it.kind) + '">복원</button>'
            + '<button class="hdelbtn" data-act="hidedel" data-key="' + esc(it.key) + '" data-kind="' + esc(it.kind) + '">삭제</button>'
            + '</div>';
        }).join("");
      }).catch(function () { });
    }

    document.getElementById("body").addEventListener("click", function (e) {
      var btn = e.target.closest(".btn,[data-act]");
      if (btn && btn.getAttribute("data-act")) { handleAction(btn); return; }
      var swatch = e.target.closest(".color-swatch");
      if (swatch) {
        var parent = swatch.parentNode;
        parent.querySelectorAll(".color-swatch").forEach(function(s) {
          s.classList.remove("active");
        });
        swatch.classList.add("active");
        return;
      }
      var main = e.target.closest(".main[data-link]");
      if (main && window.pywebview && window.pywebview.api)
        window.pywebview.api.open_link(main.getAttribute("data-link"));
    });

    window.addEventListener("focus", function () { refresh(); });
    window.addEventListener("pywebviewready", function () { refresh(); setInterval(refresh, 120000); updateDoneBadge(); });
    if (window.pywebview && window.pywebview.api) { refresh(); setInterval(refresh, 120000); }

       처리한다 — 커스텀 타이틀바/리사이즈 핸들 및 관련 브릿지 호출은 모두 제거. */

          { 제목: "납기 확인 요청", 보낸사람: "sales@sample.com", 날짜: "2026-06-22", 요약: "이번 주 내 납기 확인 부탁드립니다.", 링크: "#", 미읽음: false, 중요: true, 메모: "", 루프: false, vip: false, 내부여부: false, to_me: true, 참조요청: false },
          { 제목: "[공유] 사양서 검토 요청", 보낸사람: "partner@sample.com", 날짜: "2026-06-21", 요약: "참조하신 건 의견 회신 부탁드립니다.", 링크: "#", 미읽음: true, 중요: false, 메모: "", 루프: false, vip: false, 내부여부: false, to_me: false, 참조요청: true }
        ],
        replies: [

        ],

        project_cards: [
          { id: "mock-card-1", name: "샘플 프로젝트", senders: ["partner@sample.com"], milestones: [{ name: "킥오프", date: "2026-06-20" }, { name: "중간점검", date: "2026-07-10" }, { name: "최종납품", date: "2026-08-01" }], mails: [], stage: { current: { name: "중간점검" } }, color: "purple" }

      };
      window.pywebview = {

          get_project_rules: function () { return Promise.resolve({}); },
          get_done_count_today: function () { return Promise.resolve(2); },

          assign_sender_to_project: function (e, p) { alert(e + " → " + p + " 지정 (mock)"); return Promise.resolve({ ok: true }); },
          save_project: function (n, s) { alert("프로젝트 '" + n + "' 생성 (mock)"); return Promise.resolve({ ok: true }); },
          snooze: function (k, d) { alert(k + " " + d + "일 스누즈 (mock)"); return Promise.resolve({ ok: true }); },
          mark_done: function (k) { return Promise.resolve({ ok: true }); },

          reauth: function () { },

          toggle_important: function (k, v) { return Promise.resolve({ ok: true }); },
          add_project_card: function (name) {
            var newCard = { id: "mock-card-" + Date.now(), name: name, senders: [], milestones: [], mails: [], stage: null, color: "blue" };
            _mockView.project_cards.push(newCard);
            return Promise.resolve({ ok: true, card: newCard });
          },
          update_project_card: function (id, payload) {
            for (var i = 0; i < _mockView.project_cards.length; i++) {
              var c = _mockView.project_cards[i];
              if (c.id === id) {
                if (payload.name !== undefined) c.name = payload.name;
                if (payload.senders !== undefined) c.senders = payload.senders;
                if (payload.color !== undefined) c.color = payload.color;
                break;
              }
            }
            return Promise.resolve({ ok: true });
          },
          del_project_card: function (id) {
            _mockView.project_cards = _mockView.project_cards.filter(function(c) { return c.id !== id; });
            return Promise.resolve({ ok: true });
          },

      refresh();
